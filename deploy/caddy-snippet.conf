# Caddy configuration snippets for nanobot
#
# Add these blocks to /etc/caddy/Caddyfile on the server,
# then reload: sudo systemctl reload caddy

# ── Production ─────────────────────────────────────────────────────────
# https://nanobot.internal {
#     bind 10.50.0.1
#     tls internal
#     reverse_proxy 127.0.0.1:18790
# }

# ── Staging ────────────────────────────────────────────────────────────
# https://staging.nanobot.internal {
#     bind 10.50.0.1
#     tls internal
#     reverse_proxy 127.0.0.1:18791
# }
