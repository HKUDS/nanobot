name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install pip-audit
        # Pin version to prevent dependency drift between CI and security scan (LAN-169)
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: pip-audit --strict --desc

  trivy-image:
    name: Container image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on push, PRs, and scheduled scans — non-blocking (exit-code: '0')
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t nanobot-scan:${{ github.sha }} .

      # Gate step: human-readable table output that ALSO gates the build.
      # This is the authoritative check — if this finds fixable HIGH/CRITICAL
      # vulnerabilities, the job fails with visible output showing exactly
      # which packages and CVEs are involved.
      #
      # --ignore-unfixed: only fail on CVEs with available patches.
      # --scanners vuln: vulnerability scanning only (no secret/misconfig).
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: nanobot-scan:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          trivyignores: '.trivyignore'
          ignore-unfixed: true
          scanners: 'vuln'

      # SARIF upload for GitHub Security tab — always runs (even if gate
      # step fails) so findings are visible in the Security tab.
      # exit-code 0: this step never fails the build; the table step above
      # is the gate.  SARIF format + ignore-unfixed interact poorly in Trivy
      # (exit-code 1 even when all findings are filtered), so we decouple
      # the gate from the upload.
      - name: Trivy SARIF upload
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: nanobot-scan:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          scanners: 'vuln'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  trivy-config:
    name: Dockerfile & Compose linting
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          trivyignores: '.trivyignore'
