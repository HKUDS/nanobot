<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}nanobot{% endblock %} - nanobot Web UI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="{{ url_for('static', filename='img/nanobot_logo.png') }}" alt="nanobot" class="logo-img" 
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <h4 class="mb-0" style="display: none;">🐈 nanobot</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="/" class="list-group-item list-group-item-action {% if active_page == 'dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="/chat" class="list-group-item list-group-item-action {% if active_page == 'chat' %}active{% endif %}">
                    <i class="bi bi-chat-dots me-2"></i>Chat
                </a>
                <a href="/config" class="list-group-item list-group-item-action {% if active_page == 'config' %}active{% endif %}">
                    <i class="bi bi-gear me-2"></i>Configuration
                </a>
                <a href="/channels" class="list-group-item list-group-item-action {% if active_page == 'channels' %}active{% endif %}">
                    <i class="bi bi-plug me-2"></i>Channels
                </a>
                <a href="/status" class="list-group-item list-group-item-action {% if active_page == 'status' %}active{% endif %}">
                    <i class="bi bi-activity me-2"></i>Status
                </a>
            </div>
        </div>
        
        <!-- Page Content -->
        <div id="page-content-wrapper">
            <!-- Top Navigation -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    
                    <div class="ms-auto d-flex align-items-center">
                        <span class="badge bg-success me-3" id="connectionStatus">
                            <i class="bi bi-circle-fill small"></i> Connected
                        </span>
                        <a href="https://github.com/HKUDS/nanobot" target="_blank" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-github"></i> GitHub
                        </a>
                    </div>
                </div>
            </nav>
            
            <!-- Main Content -->
            <div class="container-fluid px-4 py-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <i class="bi bi-bell me-2"></i>
                <strong class="me-auto">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                <!-- Message will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom JS - Load BEFORE page scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
