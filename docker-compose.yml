version: '3.8'

x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/home/nanobot/.nanobot
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  init-config:
    image: busybox
    volumes:
      - nanobot_data:/root/.nanobot
    environment:
      - ZAI_API_KEY=${ZAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    command:
      - sh
      - -c
      - |
        echo '{
          "providers": {
            "custom": {
              "apiKey": "${ZAI_API_KEY}",
              "apiBase": "https://api.z.ai/api/coding/paas/v4"
            }
          },
          "agents": {
            "defaults": {
              "model": "${LLM_MODEL}"
            }
          },
          "channels": {
            "telegram": {
              "enabled": true,
              "token": "${TELEGRAM_TOKEN}",
              "allowFrom": ${TELEGRAM_ALLOWED_USERS}
            },
            "discord": {
              "enabled": true,
              "token": "${DISCORD_TOKEN}",
              "allowFrom": ${DISCORD_ALLOWED_USERS}
            }
          },
          "tools": {
            "web": {
              "search": {
                "apiKey": "${BRAVE_API_KEY}",
                "maxResults": 5
              }
            },
            "mcpServers": {
              "stripe": {
                "url": "https://mcp.stripe.com/",
                "headers": {
                  "Authorization": "Bearer ${STRIPE_SECRET_KEY}"
                }
              },
              "fencode_blog_mcp": {
                "command": "npx",
                "args": [
                  "-y",
                  "mcp-remote@latest",
                  "https://fencode-blog-mcp.vercel.app/mcp"
                ],
                "disabled": false
              }
            }
          }
        }' > /root/.nanobot/config.json

  nanobot-gateway:
    container_name: nanobot-gateway
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - nanobot_data:/root/.nanobot
    command:
      - gateway
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-api:
    container_name: nanobot-api
    <<: *common-config
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  nanobot_data:
