name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: lint + typecheck + import-check + prompt-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # TEMPORARY: litellm pulled from PyPI after supply chain attack (2026-03-24).
      # Pre-install from GitHub at pinned safe commit before pip install resolves deps.
      # Remove this step once litellm publishes verified releases to PyPI.
      - name: Pre-install litellm from source (PyPI unavailable)
        run: pip install "litellm @ git+https://github.com/BerriAI/litellm.git@v1.76.2"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check nanobot/ tests/
      - name: Ruff format check
        run: ruff format --check nanobot/ tests/
      - name: mypy
        run: python -m mypy nanobot/
      - name: Enforce module boundaries
        run: python scripts/check_imports.py
      - name: Verify prompt manifest
        run: python scripts/check_prompt_manifest.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Pre-install litellm from source (PyPI unavailable)
        run: pip install "litellm @ git+https://github.com/BerriAI/litellm.git@v1.76.2"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: python -m pytest tests/ -x -q --cov=nanobot --cov-report=term-missing --cov-report=json --cov-fail-under=85
      - name: Check per-module coverage thresholds
        run: python scripts/check_module_coverage.py

  llm-roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pre-install litellm from source (PyPI unavailable)
        run: pip install "litellm @ git+https://github.com/BerriAI/litellm.git@v1.76.2"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run LLM round-trip tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No API key — skipping LLM tests"
            exit 0
          fi
          pytest tests/test_memory_roundtrip.py -v -m llm --timeout=120
