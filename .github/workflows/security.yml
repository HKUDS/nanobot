name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install pip-audit
        # Pin version to prevent dependency drift between CI and security scan (LAN-169)
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: pip-audit --strict --desc

  trivy-image:
    name: Container image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only scan when image might have changed
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t nanobot-scan:${{ github.sha }} .

      # Step 1: Human-readable table output for CI logs (never fails the build).
      # This ensures developers can see exactly which CVEs triggered a failure
      # without navigating to the GitHub Security tab.
      - name: Trivy scan (table for logs)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: nanobot-scan:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          trivyignores: '.trivyignore'
          ignore-unfixed: true

      # Step 2: SARIF output for GitHub Security tab (gates the build).
      # --ignore-unfixed: only block on CVEs with available patches.
      # OS-level CVEs without Debian fixes are reported but don't block.
      - name: Trivy scan (SARIF for GitHub Security)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: nanobot-scan:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          trivyignores: '.trivyignore'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  trivy-config:
    name: Dockerfile & Compose linting
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          trivyignores: '.trivyignore'
