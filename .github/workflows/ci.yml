name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: lint + typecheck + import-check + structure-check + prompt-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check nanobot/ tests/
      - name: Ruff format check
        run: ruff format --check nanobot/ tests/
      - name: mypy
        run: python -m mypy nanobot/
      - name: Enforce module boundaries
        run: python scripts/check_imports.py
      - name: Enforce structural rules
        run: python scripts/check_structure.py
      - name: Verify prompt manifest
        run: python scripts/check_prompt_manifest.py
      - name: Check phase TODOs
        run: python scripts/check_phase_todos.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache ONNX reranker model
        uses: actions/cache@v4
        with:
          path: ~/.cache/nanobot/models
          key: onnx-reranker-ms-marco-MiniLM-L-6-v2
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: python -m pytest tests/ --ignore=tests/integration -x -q --cov=nanobot --cov-report=term-missing --cov-report=json --cov-fail-under=85

  integration:
    name: integration + LLM round-trip (requires API key)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No API key — skipping integration tests"
            exit 0
          fi
          pytest tests/integration/ -v
      - name: Run LLM round-trip tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No API key — skipping LLM tests"
            exit 0
          fi
          pytest tests/test_memory_roundtrip.py -v -m llm --timeout=120
