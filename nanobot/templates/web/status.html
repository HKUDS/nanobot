<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status - nanobot Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="/static/img/nanobot_logo.png" alt="nanobot" class="logo-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <h4 class="mb-0" style="display: none;">🐈 nanobot</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="/index.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="/chat.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-chat-dots me-2"></i>Chat
                </a>
                <a href="/config.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear me-2"></i>Configuration
                </a>
                <a href="/status.html" class="list-group-item list-group-item-action active">
                    <i class="bi bi-activity me-2"></i>Status
                </a>
                <a href="/channels.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-plug me-2"></i>Channels
                </a>
            </div>
        </div>
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                </div>
            </nav>
            <div class="container-fluid p-4">
                <div class="row mb-4">
                    <div class="col-12">
                        <h1><i class="bi bi-activity me-2"></i>System Status</h1>
                        <p class="text-muted">Monitor your nanobot instance health and configuration</p>
                    </div>
                </div>
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm h-100">
                            <div class="card-body text-center">
                                <i class="bi bi-file-earmark-check display-4 text-success mb-3"></i>
                                <h5>Configuration</h5>
                                <div id="configStatus" class="badge bg-secondary">Loading...</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm h-100">
                            <div class="card-body text-center">
                                <i class="bi bi-folder display-4 text-primary mb-3"></i>
                                <h5>Workspace</h5>
                                <div id="workspaceStatus" class="badge bg-secondary">Loading...</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm h-100">
                            <div class="card-body text-center">
                                <i class="bi bi-cloud display-4 text-info mb-3"></i>
                                <h5>Providers</h5>
                                <div id="providersStatus" class="badge bg-secondary">Loading...</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm h-100">
                            <div class="card-body text-center">
                                <i class="bi bi-plug display-4 text-warning mb-3"></i>
                                <h5>Channels</h5>
                                <div id="channelsStatus" class="badge bg-secondary">Loading...</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-cloud me-2"></i>Providers</h5>
                            </div>
                            <div class="card-body">
                                <div id="providersList">
                                    <div class="text-center py-3">
                                        <div class="spinner-border spinner-border-sm" role="status"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-plug me-2"></i>Channels</h5>
                            </div>
                            <div class="card-body">
                                <div id="channelsList">
                                    <div class="text-center py-3">
                                        <div class="spinner-border spinner-border-sm" role="status"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-12 text-center">
                        <button class="btn btn-primary" onclick="loadStatus()">
                            <i class="bi bi-arrow-clockwise me-2"></i>Refresh Status
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <i class="bi bi-bell-fill me-2"></i>
                <strong class="me-auto">nanobot</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Notification message
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/status.js"></script>
</body>
</html>
