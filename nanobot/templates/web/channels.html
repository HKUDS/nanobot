<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channels - nanobot Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="/static/img/nanobot_logo.png" alt="nanobot" class="logo-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <h4 class="mb-0" style="display: none;">🐈 nanobot</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="/index.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="/chat.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-chat-dots me-2"></i>Chat
                </a>
                <a href="/config.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear me-2"></i>Configuration
                </a>
                <a href="/status.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-activity me-2"></i>Status
                </a>
                <a href="/channels.html" class="list-group-item list-group-item-action active">
                    <i class="bi bi-plug me-2"></i>Channels
                </a>
            </div>
        </div>
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                </div>
            </nav>
            <div class="container-fluid p-4">
                <div class="row mb-4">
                    <div class="col-12">
                        <h1><i class="bi bi-plug me-2"></i>Channel Management</h1>
                        <p class="text-muted">Configure and manage chat channel integrations</p>
                    </div>
                </div>
                <div class="row g-4" id="channelsList">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="channelConfigModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="channelConfigTitle">Configure Channel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="channelConfigForm">
                        <input type="hidden" id="channelName">
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle me-2"></i>
                            <span id="channelDescription">Configure your channel settings below.</span>
                        </div>
                        <div id="channelConfigFields"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveChannelConfig()">
                        <i class="bi bi-save me-2"></i>Save Configuration
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/channels.js"></script>
</body>
</html>
