# Deploy to Droplet on push to orghi-main
# Build -> push to GHCR -> SSH -> pull & restart

name: Deploy

on:
  push:
    branches:
      - orghi-main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get image tag
        id: tag
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          SHA=$(git rev-parse --short HEAD)
          echo "tag=${VERSION}-${SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.orghi
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export ORGHI_IMAGE=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            cd ${{ secrets.DEPLOY_PATH || '/opt/orghi' }}

            # Capture current image before deploy (empty on first deploy)
            OLD_IMAGE=$(docker inspect nanobot-gateway --format '{{.Config.Image}}' 2>/dev/null || true)

            git pull origin orghi-main
            docker compose -f docker-compose.orghi.yml pull
            docker compose -f docker-compose.orghi.yml up -d

            # Remove previous image to free space
            if [ -n "$OLD_IMAGE" ] && [ "$OLD_IMAGE" != "$ORGHI_IMAGE" ]; then
              docker rmi "$OLD_IMAGE" 2>/dev/null || true
            fi
