<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldClaw Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Zone 1: Top Bar -->
  <header>
    <div class="header-left">
      <span class="header-name" id="agent-name">WorldClaw</span>
      <div class="header-badges" id="header-badges">
        <span class="badge status-initializing"><span class="spinner"></span> Loading</span>
      </div>
    </div>
    <div class="header-cards" id="header-cards"></div>
    <div class="header-right">
      <span id="last-updated"></span>
      <button id="refresh-btn" title="Refresh now">Refresh</button>
    </div>
  </header>

  <!-- Zone 2: Tabbed Primary View -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="activity">Activity</button>
    <button class="tab" data-tab="system">System</button>
  </nav>

  <main>

    <!-- Activity Tab -->
    <div class="tab-content active" id="tab-activity">
      <div class="activity-feed" id="activity-feed">
        <div class="empty"><span class="spinner"></span> Loading</div>
      </div>
    </div>

    <!-- System Tab -->
    <div class="tab-content" id="tab-system">
      <div class="system-grid">
        <div class="panel">
          <div class="panel-header">Channels</div>
          <div class="panel-body" id="sys-channels"></div>
        </div>
        <div class="panel">
          <div class="panel-header">Message Bus</div>
          <div class="panel-body" id="sys-bus"></div>
        </div>
        <div class="panel">
          <div class="panel-header">Tools
            <span class="panel-count" id="tools-count"></span>
          </div>
          <div class="panel-body" id="sys-tools"></div>
        </div>
        <div class="panel">
          <div class="panel-header">Scheduled Tasks</div>
          <div class="panel-body" id="sys-cron"></div>
        </div>
        <div class="panel">
          <div class="panel-header">MCP Servers</div>
          <div class="panel-body" id="sys-mcp"></div>
        </div>
        <div class="panel">
          <div class="panel-header">Memory</div>
          <div class="panel-body" id="sys-memory"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Zone 3: Session Inspector Drawer -->
  <div id="session-drawer">
    <div id="drawer-header">
      <div id="drawer-title-row">
        <span id="drawer-title"></span>
        <button id="drawer-close" onclick="closeDrawer()">Close</button>
      </div>
      <div id="drawer-stats"></div>
    </div>
    <div id="drawer-messages"></div>
  </div>

  <!-- File Viewer Modal -->
  <div id="file-modal" class="modal-overlay" onclick="closeFileModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span id="file-modal-title"></span>
        <span id="file-modal-size"></span>
        <button class="modal-close" onclick="closeFileModal()">Close</button>
      </div>
      <pre id="file-modal-content" class="modal-content"></pre>
    </div>
  </div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
