x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - NET_RAW      # raw sockets (ping, ICMP, packet crafting); not needed by the app
    - AUDIT_WRITE  # kernel audit log writes; not needed by the app
  pids_limit: 200
  tmpfs:
    - /tmp:noexec,nodev,nosuid,size=100m
    - /run:noexec,nodev,nosuid,size=50m

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-cli-rest-api
    profiles:
      - signal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - AUDIT_WRITE
    pids_limit: 100
    tmpfs:
      - /tmp:noexec,nodev,nosuid,size=50m
      - /run:noexec,nodev,nosuid,size=25m
    environment:
      - MODE=json-rpc  # json-rpc enables WebSocket receive; use "native" for polling mode
    ports:
      - "8090:8080"
    volumes:
      - ~/.nanobot/signal-data:/home/.local/share/signal-cli
    restart: unless-stopped
