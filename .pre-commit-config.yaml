repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^uv\.lock$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: python -m mypy nanobot/
        language: system
        types: [python]
        pass_filenames: false
      - id: import-check
        name: import boundary check
        entry: python scripts/check_imports.py
        language: system
        pass_filenames: false
      - id: structure-check
        name: structure check
        entry: python scripts/check_structure.py
        language: system
        pass_filenames: false
      - id: prompt-check
        name: prompt manifest check
        entry: python scripts/check_prompt_manifest.py
        language: system
        pass_filenames: false
        files: '^prompts/'
      - id: phase-todo-check
        name: phase TODO check
        entry: python scripts/check_phase_todos.py
        language: system
        pass_filenames: false
        files: '^nanobot/'
      - id: doc-check
        name: doc reference check
        entry: python scripts/check_doc_references.py
        language: system
        pass_filenames: false
        files: '^docs/architecture\.md$'
