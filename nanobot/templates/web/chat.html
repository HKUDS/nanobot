<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - nanobot Web UI</title>
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link href="./css/bootstrap-icons.min.css" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"> -->
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .chat-container { height: calc(100vh - 120px); }
        .chat-messages { min-height: 400px; max-height: calc(100vh - 300px); overflow-y: auto; }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="/static/img/nanobot_logo.png" alt="nanobot" class="logo-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <h4 class="mb-0" style="display: none;">🐈 nanobot</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="/index.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="/chat.html" class="list-group-item list-group-item-action active">
                    <i class="bi bi-chat-dots me-2"></i>Chat
                </a>
                <a href="/config.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear me-2"></i>Configuration
                </a>
                <a href="/status.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-activity me-2"></i>Status
                </a>
                <a href="/channels.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-plug me-2"></i>Channels
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                </div>
            </nav>

            <div class="container-fluid p-4 chat-container">
                <div class="row h-100">
                    <div class="col-12 h-100">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="bi bi-chat-dots me-2"></i>Chat with nanobot</h5>
                                <div class="ms-2">
                                    <select class="form-select form-select-sm d-inline-block w-auto" id="sessionSelect">
                                        <option value="web:default">Default Session</option>
                                    </select>
                                    <button class="btn btn-outline-secondary btn-sm ms-2" onclick="clearChat()" title="Clear chat">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="card-body p-0 d-flex flex-column">
                                <div id="chatMessages" class="flex-grow-1 p-4 overflow-auto chat-messages">
                                    <div class="text-center text-muted py-5" id="welcomeMessage">
                                        <i class="bi bi-robot display-1 mb-3"></i>
                                        <h4>Welcome to nanobot Chat</h4>
                                        <p>Start a conversation with your AI assistant</p>
                                    </div>
                                </div>
                                <div class="border-top p-3 bg-light">
                                    <div class="input-group">
                                        <textarea class="form-control" id="chatInput" rows="2"
                                                  placeholder="Type your message here... (Press Enter to send, Shift+Enter for new line)"
                                                  onkeypress="handleChatKeyPress(event)"></textarea>
                                        <button class="btn btn-primary" type="button" id="sendButton" onclick="sendMessage()">
                                            <i class="bi bi-send me-1"></i>Send
                                        </button>
                                        <button class="btn btn-outline-secondary" type="button" id="stopButton" onclick="stopGeneration()" style="display: none;">
                                            <i class="bi bi-stop-circle me-1"></i>Stop
                                        </button>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mt-2">
                                        <small class="text-muted">
                                            <i class="bi bi-info-circle me-1"></i>
                                            Markdown supported • Session: <span id="currentSession">web:default</span>
                                        </small>
                                        <div id="typingIndicator" style="display: none;">
                                            <span class="spinner-border spinner-border-sm me-1"></span>
                                            <span>nanobot is thinking...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <i class="bi bi-bell-fill me-2"></i>
                <strong class="me-auto">nanobot</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Notification message
            </div>
        </div>
    </div>

    <script src="./js/bootstrap.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="./js/marked.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->
    <script src="/static/js/app.js"></script>
    <script>
        let isGenerating = false;
        let currentAbortController = null;
        let streamingMessageDiv = null;

        document.addEventListener('DOMContentLoaded', function() {
            setupSidebarToggle();
        });

        function handleChatKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || isGenerating) return;
            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) welcomeMsg.style.display = 'none';
            addMessage('user', message);
            input.value = '';
            setGenerating(true);
            const sessionId = document.getElementById('sessionSelect').value;
            
            // Create streaming message placeholder
            streamingMessageDiv = addMessage('assistant', '', {}, true);
            
            try {
                await streamChat(message, sessionId);
            } catch (error) {
                console.error('Chat error:', error);
                if (streamingMessageDiv) {
                    streamingMessageDiv.innerHTML += `<div class="alert alert-danger mt-2">Error: ${escapeHtml(error.message)}</div>`;
                } else {
                    addMessage('error', `Error: ${error.message}`);
                }
            } finally {
                setGenerating(false);
                streamingMessageDiv = null;
            }
        }

        async function streamChat(message, sessionId) {
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;
            let metadata = {};
            let hasError = false;
            
            try {
                const response = await fetch('/api/chat?stream=true', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Auth-Token': api.getToken() || ''
                    },
                    body: JSON.stringify({ message: message, session_id: sessionId }),
                    signal: signal
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: 'Request failed' }));
                    throw new Error(errorData.detail || `HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                continue;
                            }
                            try {
                                const event = JSON.parse(data);
                                if (event.type === 'content') {
                                    fullContent += event.content;
                                    streamingMessageDiv.innerHTML = marked.parse(fullContent);
                                    scrollToBottom();
                                } else if (event.type === 'error') {
                                    hasError = true;
                                    throw new Error(event.error);
                                } else if (event.type === 'done') {
                                    metadata = event.metadata || {};
                                    // Check if content contains an error
                                    if (event.content && (event.content.startsWith('Error') || event.content.includes('Error calling LLM'))) {
                                        hasError = true;
                                        throw new Error(event.content);
                                    }
                                    // Update with model info if available
                                    const messageEl = streamingMessageDiv.closest('.message');
                                    if (messageEl && metadata.metadata && metadata.metadata.model) {
                                        const modelBadge = messageEl.querySelector('.text-muted.ms-2');
                                        if (!modelBadge) {
                                            const modelInfo = messageEl.querySelector('.fw-bold');
                                            if (modelInfo) {
                                                modelInfo.innerHTML += ` <small class="text-muted ms-2">${escapeHtml(metadata.metadata.model)}</small>`;
                                            }
                                        }
                                    }
                                    // Add copy button after completion
                                    const messageContent = streamingMessageDiv.closest('.message');
                                    if (messageContent && !messageContent.querySelector('button[onclick^="copyMessage"]')) {
                                        const actionsDiv = document.createElement('div');
                                        actionsDiv.className = 'mt-2';
                                        actionsDiv.innerHTML = `
                                            <button class="btn btn-sm btn-link" onclick="copyMessage(this)" title="Copy">
                                                <i class="bi bi-clipboard"></i>
                                            </button>
                                        `;
                                        messageContent.querySelector('.message-content').appendChild(actionsDiv);
                                    }
                                }
                            } catch (e) {
                                if (e.name !== 'SyntaxError') throw e;
                            }
                        }
                    }
                }
            } finally {
                currentAbortController = null;
            }
        }

        function stopGeneration() {
            if (currentAbortController) {
                currentAbortController.abort();
                setGenerating(false);
            }
        }

        function addMessage(role, content, metadata = {}, isStreaming = false) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message mb-3`;
            const isUser = role === 'user';
            const isError = role === 'error';
            const isInfo = role === 'info';
            let contentHtml = '';
            if (isUser) {
                contentHtml = `<div class="text-break">${escapeHtml(content)}</div>`;
            } else if (isError) {
                contentHtml = `<div class="alert alert-danger mb-0">${escapeHtml(content)}</div>`;
            } else if (isInfo) {
                contentHtml = `<div class="alert alert-info mb-0">${escapeHtml(content)}</div>`;
            } else {
                contentHtml = content ? marked.parse(content) : '<span class="text-muted">Thinking...</span>';
            }
            messageDiv.innerHTML = `
                <div class="d-flex align-items-start ${isUser ? 'flex-row-reverse' : ''}">
                    <div class="avatar ${isUser ? 'bg-primary' : 'bg-success'} text-white rounded-circle d-flex align-items-center justify-content-center me-2 flex-shrink-0"
                         style="width: 36px; height: 36px;">
                        <i class="bi ${isUser ? 'bi-person' : 'bi-robot'}"></i>
                    </div>
                    <div class="${isUser ? 'text-end' : ''} flex-grow-1">
                        <div class="fw-bold mb-1 ${isUser ? 'text-primary' : 'text-success'}">
                            ${isUser ? 'You' : 'nanobot'}
                            ${metadata && metadata.model ? `<small class="text-muted ms-2">${metadata.model}</small>` : ''}
                        </div>
                        <div class="message-content ${isUser ? 'bg-primary text-white' : isError || isInfo ? '' : 'bg-light'} rounded p-3 d-inline-block">
                            ${contentHtml}
                        </div>
                        ${!isUser && !isError && !isInfo && !isStreaming ? `
                        <div class="mt-2">
                            <button class="btn btn-sm btn-link" onclick="copyMessage(this)" title="Copy">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv.querySelector('.message-content');
        }

        function setGenerating(generating) {
            isGenerating = generating;
            const sendButton = document.getElementById('sendButton');
            const stopButton = document.getElementById('stopButton');
            const typingIndicator = document.getElementById('typingIndicator');
            const input = document.getElementById('chatInput');
            if (generating) {
                sendButton.style.display = 'none';
                stopButton.style.display = 'inline-block';
                typingIndicator.style.display = 'block';
                input.disabled = true;
            } else {
                sendButton.style.display = 'inline-block';
                stopButton.style.display = 'none';
                typingIndicator.style.display = 'none';
                input.disabled = false;
                input.focus();
            }
        }

        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function clearChat() {
            if (!confirm('Clear all chat messages?')) return;
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = `
                <div class="text-center text-muted py-5" id="welcomeMessage">
                    <i class="bi bi-robot display-1 mb-3"></i>
                    <h4>Welcome to nanobot Chat</h4>
                    <p>Start a conversation with your AI assistant</p>
                </div>
            `;
        }

        function copyMessage(button) {
            const content = button.closest('.message').querySelector('.message-content').innerText;
            navigator.clipboard.writeText(content).then(() => {
                showToast('Message copied', 'success');
                button.innerHTML = '<i class="bi bi-check"></i>';
                setTimeout(() => {
                    button.innerHTML = '<i class="bi bi-clipboard"></i>';
                }, 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupSidebarToggle() {
            document.getElementById('sidebarToggle').addEventListener('click', function() {
                document.getElementById('sidebar-wrapper').classList.toggle('collapsed');
            });
        }
    </script>
</body>
</html>
