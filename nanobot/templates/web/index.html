<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - nanobot Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="/static/img/nanobot_logo.png" alt="nanobot" class="logo-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <h4 class="mb-0" style="display: none;">🐈 nanobot</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="/index.html" class="list-group-item list-group-item-action active">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="/chat.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-chat-dots me-2"></i>Chat
                </a>
                <a href="/config.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear me-2"></i>Configuration
                </a>
                <a href="/status.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-activity me-2"></i>Status
                </a>
                <a href="/channels.html" class="list-group-item list-group-item-action">
                    <i class="bi bi-plug me-2"></i>Channels
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="row">
                    <div class="col-12">
                        <h1 class="mb-4">🐈 nanobot Dashboard</h1>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted mb-2">Status</h6>
                                        <h4 class="mb-0" id="statusModel">-</h4>
                                    </div>
                                    <i class="bi bi-robot display-4 text-primary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted mb-2">Config</h6>
                                        <h4 class="mb-0" id="statusConfig">-</h4>
                                    </div>
                                    <i class="bi bi-file-earmark-check display-4 text-success"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted mb-2">Channels</h6>
                                        <h4 class="mb-0" id="statusChannels">-</h4>
                                    </div>
                                    <i class="bi bi-plug display-4 text-info"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="text-muted mb-2">Providers</h6>
                                        <h4 class="mb-0" id="statusProviders">-</h4>
                                    </div>
                                    <i class="bi bi-cloud-check display-4 text-warning"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-lightning-charge me-2"></i>Quick Actions</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <a href="/chat.html" class="btn btn-primary">
                                        <i class="bi bi-chat-dots me-2"></i>Chat with Agent
                                    </a>
                                    <a href="/config.html" class="btn btn-outline-primary">
                                        <i class="bi bi-gear me-2"></i>Configure nanobot
                                    </a>
                                    <a href="/channels.html" class="btn btn-outline-primary">
                                        <i class="bi bi-plug me-2"></i>Manage Channels
                                    </a>
                                    <button class="btn btn-outline-primary" onclick="checkStatus()">
                                        <i class="bi bi-arrow-clockwise me-2"></i>Refresh Status
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-info-circle me-2"></i>System Info</h5>
                            </div>
                            <div class="card-body">
                                <ul class="list-unstyled mb-0" id="systemInfo">
                                    <li class="py-2 border-bottom">
                                        <strong>Version:</strong> <span class="text-muted">0.1.4.post5</span>
                                    </li>
                                    <li class="py-2 border-bottom">
                                        <strong>Workspace:</strong> <span class="text-muted">Loading...</span>
                                    </li>
                                    <li class="py-2">
                                        <strong>Gateway Port:</strong> <span class="text-muted">Loading...</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-terminal me-2"></i>Quick Chat</h5>
                            </div>
                            <div class="card-body">
                                <div class="input-group">
                                    <input type="text" class="form-control" id="quickChatInput"
                                           placeholder="Type a message to nanobot..."
                                           onkeypress="if(event.key==='Enter') sendQuickChat()">
                                    <button class="btn btn-primary" type="button" onclick="sendQuickChat()">
                                        <i class="bi bi-send me-1"></i>Send
                                    </button>
                                </div>
                                <div id="quickChatResponse" class="mt-3" style="display: none;">
                                    <div class="alert alert-light border">
                                        <div id="quickChatResponseContent"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
            setupSidebarToggle();
        });

        async function loadDashboard() {
            try {
                const status = await api.get('/api/status');
                document.getElementById('statusModel').textContent = status.model || 'Not configured';
                document.getElementById('statusConfig').textContent = status.config_exists ? '✓ Ready' : '✗ Missing';
                const enabledChannels = Object.values(status.channels || {}).filter(c => c.enabled).length;
                const totalChannels = Object.keys(status.channels || {}).length;
                document.getElementById('statusChannels').textContent = `${enabledChannels}/${totalChannels}`;
                const configuredProviders = Object.values(status.providers || {}).filter(p => p.configured).length;
                const totalProviders = Object.keys(status.providers || {}).length;
                document.getElementById('statusProviders').textContent = `${configuredProviders}/${totalProviders}`;
                const systemInfo = document.getElementById('systemInfo');
                systemInfo.innerHTML = `
                    <li class="py-2 border-bottom">
                        <strong>Version:</strong> <span class="text-muted">0.1.4.post5</span>
                    </li>
                    <li class="py-2 border-bottom">
                        <strong>Workspace:</strong> <span class="text-muted">${status.workspace_exists ? '✓ Active' : '✗ Not found'}</span>
                    </li>
                    <li class="py-2">
                        <strong>Gateway Port:</strong> <span class="text-muted">${status.gateway?.port || 18790}</span>
                    </li>
                `;
            } catch (error) {
                console.error('Failed to load dashboard:', error);
                showToast('Failed to load dashboard data', 'danger');
            }
        }

        async function sendQuickChat() {
            const input = document.getElementById('quickChatInput');
            const responseDiv = document.getElementById('quickChatResponse');
            const responseContent = document.getElementById('quickChatResponseContent');
            const message = input.value.trim();
            if (!message) return;
            input.disabled = true;
            responseDiv.style.display = 'block';
            responseContent.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div>Thinking...';
            try {
                const result = await api.post('/api/chat', { message: message, session_id: 'web:quick' });
                responseContent.innerHTML = marked.parse(result.response);
            } catch (error) {
                responseContent.innerHTML = `<div class="alert alert-danger mb-0">Error: ${error.message}</div>`;
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        function checkStatus() {
            loadDashboard();
            showToast('Status refreshed', 'success');
        }

        function setupSidebarToggle() {
            document.getElementById('sidebarToggle').addEventListener('click', function() {
                document.getElementById('sidebar-wrapper').classList.toggle('collapsed');
            });
        }
    </script>
</body>
</html>
