x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot
    - .:/app
  networks:
    - nanobot-net

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    networks:
      - nanobot-net
      - playwright-net
    command: ["gateway"]
    environment:
      - NANOBOT_BRIDGE=0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

networks:
  nanobot-net:
    external: true
  playwright-net:
    external: true
