version: '3.8'

x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - nanobot_data:/home/nanobot/.nanobot
  user: "1000:1000"
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  init-config:
    image: busybox
    volumes:
      - nanobot_data:/home/nanobot/.nanobot
    environment:
      - PROVIDER_NAME=${PROVIDER_NAME:-custom}
      - PROVIDER_API_KEY=${PROVIDER_API_KEY:-${ZAI_API_KEY}}
      - PROVIDER_API_BASE=${PROVIDER_API_BASE:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-[]}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS:-[]}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    command:
      - sh
      - -c
      - |
        mkdir -p /home/nanobot/.nanobot
        P_NAME=$$(echo "$${PROVIDER_NAME}" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
        echo "Configuring providers: custom and $${P_NAME}..."
        
        cat <<EOF > /home/nanobot/.nanobot/config.json
        {
          "providers": {
            "custom": {
              "apiKey": "$${PROVIDER_API_KEY}",
              "apiBase": "$${PROVIDER_API_BASE}"
            },
            "$${P_NAME}": {
              "apiKey": "$${PROVIDER_API_KEY}",
              "apiBase": "$${PROVIDER_API_BASE}"
            }
          },
          "agents": {
            "defaults": {
              "model": "$${LLM_MODEL}"
            }
          },
          "channels": {
            "telegram": {
              "enabled": true,
              "token": "$${TELEGRAM_TOKEN}",
              "allowFrom": $${TELEGRAM_ALLOWED_USERS}
            },
            "discord": {
              "enabled": true,
              "token": "$${DISCORD_TOKEN}",
              "allowFrom": $${DISCORD_ALLOWED_USERS}
            }
          },
          "tools": {
            "web": {
              "search": {
                "apiKey": "$${BRAVE_API_KEY}",
                "maxResults": 5
              }
            },
            "mcpServers": {
              "stripe": {
                "url": "https://mcp.stripe.com/",
                "headers": {
                  "Authorization": "Bearer $${STRIPE_SECRET_KEY}"
                }
              },
              "fencode_blog_mcp": {
                "command": "npx",
                "args": [
                  "-y",
                  "mcp-remote@latest",
                  "https://fencode-blog-mcp.vercel.app/mcp"
                ],
                "disabled": false
              }
            }
          }
        }
        EOF
        chown -R 1000:1000 /home/nanobot/.nanobot
        chmod -R 755 /home/nanobot/.nanobot
        echo "Done."

  nanobot-gateway:
    container_name: nanobot-gateway
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - nanobot_data:/home/nanobot/.nanobot
    command:
      - gateway
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      init-config:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-api:
    container_name: nanobot-api
    <<: *common-config
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  nanobot_data:
