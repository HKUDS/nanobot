# Production: pulls image from GHCR. No local build.
# ORGHI_IMAGE=ghcr.io/owner/orghi:{version}-{shortSha} - Actions sets this on deploy

x-common-config: &common-config
  image: ${ORGHI_IMAGE}
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
