x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  speaker-id:
    container_name: speaker-id
    build:
      context: ./speaker-id
      dockerfile: Dockerfile
    volumes:
      - ./speaker-id/profiles:/app/profiles
    ports:
      - 8001:8001
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow

  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    depends_on:
      - speaker-id
    entrypoint: ["python3", "-u", "-m", "nanobot"]
    command: ["gateway"]
    volumes:
      - ./nanobot:/app/nanobot
      - ./xiaozhi_proxy.py:/app/xiaozhi_proxy.py
      - /home/alexander/.nanobot:/root/.nanobot
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

