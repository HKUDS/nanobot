name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: [self-hosted, linux, x64]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10

    environment:
      name: staging
      url: https://staging.nanobot.internal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "image=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying image: $(grep image= "$GITHUB_OUTPUT" | cut -d= -f2-)"

      - name: Deploy to staging
        run: |
          bash deploy/deploy.sh \
            --env staging \
            --image "${{ steps.tag.outputs.image }}" \
            --timeout 60

      - name: Verify deployment
        run: |
          sleep 10
          BODY=$(curl -sf http://127.0.0.1:18791/health 2>/dev/null || echo '{}')
          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "failed")
          if [ "$STATUS" != "ok" ]; then
            echo "::error::Staging health check failed after deployment (got: $BODY)"
            exit 1
          fi
          echo "Staging deployment verified — health check passed"

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Staging deployment failed. Check container logs:"
          echo "  docker compose -p nanobot-staging -f deploy/staging/docker-compose.yml logs --tail 50"
