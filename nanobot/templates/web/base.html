<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot - Web UI</title>
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link href="./css/bootstrap-icons.min.css" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"> -->
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="/static/img/nanobot_logo.png" alt="nanobot" class="logo-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <h4 class="mb-0" style="display: none;">🐈 nanobot</h4>
            </div>
            <div class="list-group list-group-flush">
                <a href="/" class="list-group-item list-group-item-action active">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="/chat" class="list-group-item list-group-item-action">
                    <i class="bi bi-chat-dots me-2"></i>Chat
                </a>
                <a href="/config" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear me-2"></i>Configuration
                </a>
                <a href="/status" class="list-group-item list-group-item-action">
                    <i class="bi bi-activity me-2"></i>Status
                </a>
                <a href="/channels" class="list-group-item list-group-item-action">
                    <i class="bi bi-plug me-2"></i>Channels
                </a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                            <li class="nav-item">
                                <a class="nav-link" href="https://github.com/HKUDS/nanobot" target="_blank">
                                    <i class="bi bi-github"></i> GitHub
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="container-fluid" id="main-content">
                <!-- Content loaded via JavaScript based on route -->
            </div>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <script src="./js/bootstrap.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
    
    <script>
        // Simple client-side routing for static files
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            const page = path === '/' ? 'index' : path.substring(1);
            
            // Load page content via fetch
            fetch(`/static/pages/${page}.html`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Page not found');
                    }
                    return response.text();
                })
                .then(html => {
                    document.getElementById('main-content').innerHTML = html;
                    // Update active state in sidebar
                    document.querySelectorAll('.list-group-item').forEach(item => {
                        item.classList.remove('active');
                        if (item.getAttribute('href') === path) {
                            item.classList.add('active');
                        }
                    });
                    // Initialize page-specific scripts
                    if (window.initPage) {
                        window.initPage();
                    }
                })
                .catch(error => {
                    console.error('Error loading page:', error);
                    document.getElementById('main-content').innerHTML = `
                        <div class="alert alert-danger">
                            <h4>Error</h4>
                            <p>Could not load page: ${error.message}</p>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
